<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todos os Jogos | Iara Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow&family=Lexend:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../assets/styles/jogos.css" />
  </head>
  <body>
    <main class="jogos-page">
      <section class="jogos-page-hero">
        <a href="../index.html" class="jogos-page-back">
          <i class="bi bi-arrow-left"></i> Voltar para a home
        </a>
        <h1 class="jogos-page-title">Todos os jogos</h1>
      </section>

      <section class="jogos-page-grid">
        <article class="jogos-page-item">
          <img
            src="../assets/images/hellclock_thumbnail.png"
            alt="Capa do jogo Hell Clock"
          />
          <h2>Hell Clock</h2>
        </article>
        <article class="jogos-page-item">
          <img
            src="../assets/images/9kings_thumbnail.png"
            alt="Capa do jogo 9 Kings"
          />
          <h2>9 Kings</h2>
        </article>
        <article class="jogos-page-item">
          <img
            src="../assets/images/skydust_thumbnail.png"
            alt="Capa do jogo Sky Dust"
          />
          <h2>Sky Dust</h2>
        </article>
        <article class="jogos-page-item">
          <img
            src="../assets/images/aviaozinho_thumbnail.png"
            alt="Capa do jogo Aviaozinho do Trafico"
          />
          <h2>Aviaozinho do Trafico</h2>
        </article>
        <article class="jogos-page-item">
          <img
            src="../assets/images/horizonchase_thumbnail.png"
            alt="Capa do jogo Horizon Chase Turbo"
          />
          <h2>Horizon Chase Turbo</h2>
        </article>
      </section>
    </main>
  </body>
</html>
